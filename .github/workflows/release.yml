name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve and increment version
        id: resolve
        run: |
          if [[ "${{ github.ref_name }}" == v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          else
            # Read current version from .csproj and increment minor version
            CURRENT_VERSION=$(grep -oP '<Version>\K[^<]+' src/LibreLinkupDesktop-Unofficial/LibreLinkupDesktop-Unofficial.csproj)
            echo "Current version: ${CURRENT_VERSION}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"
            MINOR=$((MINOR + 1))
            VER="${MAJOR}.${MINOR}.${PATCH}"
          fi
          TAG="v${VER}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}, tag: ${TAG}"

  build-linux:
    needs: version
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore LibreLinkupDesktop-Unofficial.sln

      - name: Publish self-contained
        run: >
          dotnet publish src/LibreLinkupDesktop-Unofficial/LibreLinkupDesktop-Unofficial.csproj
          -c Release
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.version.outputs.version }}
          -o publish/linux-x64

      - name: Create .deb package
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PKG_DIR="deb-build/librelinkup-desktop-unofficial_${VERSION}_amd64"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${PKG_DIR}/usr/share/pixmaps"

          cp publish/linux-x64/LibreLinkupDesktop-Unofficial "${PKG_DIR}/usr/bin/librelinkup-desktop-unofficial"
          chmod 755 "${PKG_DIR}/usr/bin/librelinkup-desktop-unofficial"

          # Install application icon
          cp src/LibreLinkupDesktop-Unofficial/Assets/app-icon.png "${PKG_DIR}/usr/share/icons/hicolor/256x256/apps/librelinkup-desktop-unofficial.png"
          cp src/LibreLinkupDesktop-Unofficial/Assets/app-icon.png "${PKG_DIR}/usr/share/pixmaps/librelinkup-desktop-unofficial.png"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: librelinkup-desktop-unofficial
          Version: ${VERSION}
          Section: misc
          Priority: optional
          Architecture: amd64
          Maintainer: Sudip Mandal
          Homepage: https://github.com/${{ github.repository }}
          Description: LibreLinkup Desktop - Unofficial
           A lightweight desktop application for monitoring LibreLinkUp CGM data.
           Provides real-time glucose readings, trend arrows, and historical data
           from the LibreLinkUp service.
          EOF
          # Remove leading whitespace from control file
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"

          cat > "${PKG_DIR}/usr/share/applications/librelinkup-desktop-unofficial.desktop" << EOF
          [Desktop Entry]
          Name=LibreLinkup Desktop - Unofficial
          GenericName=CGM Monitor
          Comment=Monitor LibreLinkUp CGM data
          Exec=/usr/bin/librelinkup-desktop-unofficial
          Icon=librelinkup-desktop-unofficial
          Terminal=false
          Type=Application
          Categories=Utility;Health;Monitor;
          Keywords=glucose;cgm;diabetes;libre;monitor;
          StartupWMClass=LibreLinkupDesktop-Unofficial
          EOF
          sed -i 's/^          //' "${PKG_DIR}/usr/share/applications/librelinkup-desktop-unofficial.desktop"

          dpkg-deb --build "${PKG_DIR}"
          cp deb-build/*.deb publish/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreLinkupDesktop-Unofficial-linux-x64
          path: publish/linux-x64

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreLinkupDesktop-Unofficial-linux-deb
          path: publish/*.deb

  build-windows:
    needs: version
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore LibreLinkupDesktop-Unofficial.sln

      - name: Publish self-contained
        run: >
          dotnet publish src/LibreLinkupDesktop-Unofficial/LibreLinkupDesktop-Unofficial.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.version.outputs.version }}
          -o publish/win-x64

      - name: Create .exe installer
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"

          $issContent = @"
          [Setup]
          AppName=LibreLinkup Desktop - Unofficial
          AppVersion=$version
          AppPublisher=Sudip Mandal
          DefaultDirName={autopf}\LibreLinkupDesktop-Unofficial
          DefaultGroupName=LibreLinkup Desktop - Unofficial
          OutputDir=publish
          OutputBaseFilename=LibreLinkupDesktop-Unofficial-$version-x64-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          UninstallDisplayIcon={app}\LibreLinkupDesktop-Unofficial.exe

          [Files]
          Source: "publish\win-x64\LibreLinkupDesktop-Unofficial.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\LibreLinkup Desktop - Unofficial"; Filename: "{app}\LibreLinkupDesktop-Unofficial.exe"
          Name: "{autodesktop}\LibreLinkup Desktop - Unofficial"; Filename: "{app}\LibreLinkupDesktop-Unofficial.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"

          [Run]
          Filename: "{app}\LibreLinkupDesktop-Unofficial.exe"; Description: "Launch LibreLinkup Desktop"; Flags: nowait postinstall skipifsilent
          "@
          $issContent | Set-Content -Path "installer.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreLinkupDesktop-Unofficial-win-x64
          path: publish/win-x64

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreLinkupDesktop-Unofficial-win-setup
          path: publish/*-setup.exe

  release:
    needs: [version, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create archives and collect installers
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p release-files

          # Create tar.gz from linux binary
          cd artifacts/LibreLinkupDesktop-Unofficial-linux-x64
          chmod +x LibreLinkupDesktop-Unofficial || true
          tar -czf "../../release-files/LibreLinkupDesktop-Unofficial-v${VERSION}-linux-x64.tar.gz" .
          cd ../..

          # Create zip from windows binary
          cd artifacts/LibreLinkupDesktop-Unofficial-win-x64
          zip -r "../../release-files/LibreLinkupDesktop-Unofficial-v${VERSION}-win-x64.zip" .
          cd ../..

          # Copy .deb and .exe installer
          cp artifacts/LibreLinkupDesktop-Unofficial-linux-deb/*.deb release-files/ || true
          cp artifacts/LibreLinkupDesktop-Unofficial-win-setup/*-setup.exe release-files/ || true

          echo "Release files:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: LibreLinkup Desktop v${{ needs.version.outputs.version }}
          body: 'See the assets to download and install this version.'
          draft: true
          prerelease: false
          files: |
            release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository for version bump
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Commit version bump to .csproj
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          CURRENT_VERSION=$(grep -oP '<Version>\K[^<]+' src/LibreLinkupDesktop-Unofficial/LibreLinkupDesktop-Unofficial.csproj)
          sed -i "s|<Version>${CURRENT_VERSION}</Version>|<Version>${VERSION}</Version>|" src/LibreLinkupDesktop-Unofficial/LibreLinkupDesktop-Unofficial.csproj
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/LibreLinkupDesktop-Unofficial/LibreLinkupDesktop-Unofficial.csproj
          git diff --cached --quiet || git commit -m "Bump version to ${VERSION} [skip ci]"
          git push
